[workspace]
members = [
    "core",
    "cosmic",
    "epub",
    "provider",
]
resolver = "3"

[workspace.dependencies]
anyhow = "1.0.102"
assert4rs = "0.2.1"
async-trait = "0.1.89"
base64 = "0.22.1"
clap = "4.6.0"
cosmic-golden = { git = "https://github.com/peterpaul/cosmic-golden-test.git", tag = "0.2.0" }
cosmic-text = { git = "https://github.com/pop-os/cosmic-text.git" }
derive_more = "2.1.1"
sha2 = "0.11"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "macros"] }
expanduser = "1.2.2"
figment = { version = "0.10.19", default-features = false }
futures = { version = "0.3.32", default-features = false, features = ["std", "async-await"] }
futures-util = "0.3.32"
html5ever = "0.39.0"
image = { version = "0.25", default-features = false }
i18n-embed = "0.16.0"
i18n-embed-fl = "0.10.0"
indexmap = "2.14.0"
itertools = "0.14.0"
libcosmic = { git = "https://github.com/pop-os/libcosmic.git" }
mime = "0.3.17"
mupdf = "0.6"
open = "5.3.3"
pbkdf2 = "0.12.2"
quick-xml = "0.39.2"
rand = { version = "0.10.1", default-features = false }
rustc-hash = "2"
rand_core = "0.6"
regex = { version = "1.12.3", default-features = false }
reqwest = { version = "0.13.2", default-features = false }
rfd = "0.17.2"
rocket = "0.5.1"
rocket_cors = "0.6.0"
rstest = "0.26.1"
rust-embed = "8.11.0"
serde = "1.0.228"
serde_with = "3.18.0"
strum = "0.28"
thiserror = "2.0.18"
tokio = "1.51.1"
toml = "1.1.2"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", default-features = false }
trait-variant = "0.1.2"
url = "2.5.8"
tempfile = "3"
zip = { version = "8.5.1", default-features = false }

[profile.release]
lto = true
