[workspace]
members = [
    "cosmic",
    "archive_organizer",
    "gtk",
    "iced_gui",
]
resolver = "3"

[workspace.dependencies]
anyhow = "1.0.98"
assert4rs = "0.1.0"
async-trait = "0.1.88"
clap = "4.5.39"
diesel = { version = "2.2.10", features = ["chrono"] }
diesel_migrations = "2.2.0"
expanduser = "1.2.2"
figment = { version = "0.10.19", default-features = false }
futures = "0.3.31"
futures-util = "0.3.31"
glib = "0.20.10"
i18n-embed = "0.15.4"
i18n-embed-fl = "0.9.4"
iced = "0.13.1"
indexmap = "2.10.0"
itertools = "0.14.0"
mime = "0.3.17"
open = "5.3.2"
r2d2 = "0.8.10"
rand = "0.9.1"
rayon = "1.10.0"
regex = "1.11.1"
relm4 = "0.9.1"
reqwest = "0.12.22"
rfd = "0.15.3"
rocket = "0.5.1"
rocket_cors = "0.6.0"
rstest = "0.25.0"
rust-embed = "8.7.2"
serde = "1.0.219"
serde_with = "3.12.0"
strum = "0.27.1"
thiserror = "2.0.12"
tokio = "1.46.0"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
url = "2.5.4"

[profile.release]
lto = true
