[workspace]
members = [
    "cosmic",
    "archive_organizer",
    "gtk",
    "iced_gui",
]
resolver = "3"


[workspace.dependencies]
futures-util = "0.3.31"
i18n-embed = "0.15.4"
i18n-embed-fl = "0.9.4"
open = "5.3.2"
rand = "0.9.1"
relm4 = "0.9.1"
relm4-components = "0.9.1"
rocket_cors = "0.6.0"
rust-embed = "8.7.2"
serde_json = "1.0.140"
tracker = "0.2.2"

[workspace.dependencies.anyhow]
version = "1.0.98"

[workspace.dependencies.assert4rs]
version = "0.1.0"

[workspace.dependencies.async-trait]
version = "0.1.88"

[workspace.dependencies.chrono]
version = "0.4.41"

[workspace.dependencies.clap]
version = "4.5.39"

[workspace.dependencies.diesel]
version = "2.2.10"
features = ["chrono"]

[workspace.dependencies.diesel_migrations]
version = "2.2.0"

[workspace.dependencies.expanduser]
version = "1.2.2"

[workspace.dependencies.figment]
version = "0.10.19"
default-features = false

[workspace.dependencies.futures]
version = "0.3.31"

[workspace.dependencies.glib]
version = "0.20.10"

[workspace.dependencies.iced]
version = "0.13.1"

[workspace.dependencies.iced_aw]
version = "0.12.2"
default-features = false

[workspace.dependencies.indexmap]
version = "2.9.0"

[workspace.dependencies.itertools]
version = "0.14.0"

[workspace.dependencies.mime]
version = "0.3.17"

[workspace.dependencies.r2d2]
version = "0.8.10"

[workspace.dependencies.rayon]
version = "1.10.0"

[workspace.dependencies.regex]
version = "1.11.1"

[workspace.dependencies.reqwest]
version = "0.12.19"

[workspace.dependencies.rfd]
version = "0.15.3"

[workspace.dependencies.rocket]
version = "0.5.1"

[workspace.dependencies.rstest]
version = "0.25.0"

[workspace.dependencies.serde]
version = "1.0.219"

[workspace.dependencies.serde_with]
version = "3.12.0"

[workspace.dependencies.strum]
version = "0.27.1"

[workspace.dependencies.thiserror]
version = "2.0.12"

[workspace.dependencies.tokio]
version = "1.45.1"

[workspace.dependencies.tracing]
version = "0.1.41"

[workspace.dependencies.tracing-subscriber]
version = "0.3.19"

[workspace.dependencies.url]
version = "2.5.4"

[profile.release]
lto = true
