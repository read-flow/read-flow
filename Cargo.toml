[package]
name = "archive-organizer"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
anyhow = "1.0.89"
clap = { version = "4.5.20", features = ["derive"] }
diesel = { version = "2.2.0", features = ["sqlite", "r2d2", "returning_clauses_for_sqlite_3_35"] }
# build libsqlite3 as part of the build process
# uncomment this line if you run into setup issues
# libsqlite3-sys = { version = "0.30", features = ["bundled"] }
dotenvy = "0.15"
futures = "0.3.31"
iced = "0.13.1"
iced_aw = { version = "0.11.0", default-features = false, features = ["grid"] }
indexmap = "2.6.0"
itertools = "0.13.0"
mime = "0.3.17"
once_cell = "1.20.2"
r2d2 = "0.8.10"
rayon = "1.10.0"
reqwest = { version = "0.12.8", features = ["json", "stream", "multipart"] }
rfd = "0.15.0"
rocket = { version = "0.5.1", features = ["http2", "json"] }
serde = { version = "1.0.210", features = ["derive"] }
thiserror = "1.0.64"
tokio = "1.40.0"
tokio-util = { version = "0.7.12", features = ["codec", "io"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["std", "env-filter"] }
url = "2.5.2"
