[workspace]
members = [
    "core",
    "cosmic",
    "epub",
    "provider",
]
resolver = "3"

[workspace.dependencies]
anyhow = "1.0.102"
assert4rs = "0.2.0"
async-trait = "0.1.89"
base64 = "0.22.1"
clap = "4.6.0"
cosmic-golden = { git = "https://github.com/peterpaul/cosmic-golden-test.git", tag = "0.2.0" }
cosmic-text = { git = "https://github.com/pop-os/cosmic-text.git" }
derive_more = "2.1.1"
diesel = { version = "2.3.7", features = ["chrono"] }
diesel_migrations = "2.3.1"
expanduser = "1.2.2"
figment = { version = "0.10.19", default-features = false }
futures = "0.3.32"
futures-util = "0.3.32"
html5ever = "0.39.0"
image = "0.25"
i18n-embed = "0.16.0"
i18n-embed-fl = "0.10.0"
indexmap = "2.13.0"
itertools = "0.14.0"
libcosmic = { git = "https://github.com/pop-os/libcosmic.git" }
mime = "0.3.17"
mupdf = "0.6"
open = "5.3.3"
pbkdf2 = "0.12.2"
quick-xml = "0.39.2"
r2d2 = "0.8.10"
rand = "0.10.0"
rand_core = "0.6"
rayon = "1.11.0"
regex = "1.12.3"
reqwest = "0.13.2"
rfd = "0.17.2"
rocket = "0.5.1"
rocket_cors = "0.6.0"
rstest = "0.26.1"
rust-embed = "8.11.0"
serde = "1.0.228"
serde_with = "3.18.0"
strum = "0.28"
thiserror = "2.0.18"
tokio = "1.50.0"
toml = "0.9.12"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
trait-variant = "0.1.2"
url = "2.5.8"
zip = "8.2.0"

[profile.release]
lto = true
