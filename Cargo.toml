[workspace]
members = [
    "cosmic",
    "archive_organizer",
    "provider",
]
resolver = "3"

[workspace.dependencies]
anyhow = "1.0.98"
assert4rs = "0.1.0"
async-trait = "0.1.88"
base64 = "0.22.1"
clap = "4.5.52"
derive_more = "2.1.1"
diesel = { version = "2.3.5", features = ["chrono"] }
diesel_migrations = "2.2.0"
expanduser = "1.2.2"
figment = { version = "0.10.19", default-features = false }
futures = "0.3.31"
futures-util = "0.3.31"
i18n-embed = "0.16.0"
i18n-embed-fl = "0.10.0"
indexmap = "2.12.0"
itertools = "0.14.0"
mime = "0.3.17"
open = "5.3.3"
pbkdf2 = "0.12.2"
r2d2 = "0.8.10"
rand = "0.9.2"
rayon = "1.10.0"
regex = "1.12.2"
reqwest = "0.13.1"
rfd = "0.17.2"
rocket = "0.5.1"
rocket_cors = "0.6.0"
rstest = "0.26.1"
rust-embed = "8.8.0"
serde = "1.0.219"
serde_with = "3.12.0"
toml = "0.9.8"
strum = "0.27.1"
thiserror = "2.0.17"
tokio = "1.48.0"
tracing = "0.1.44"
tracing-subscriber = "0.3.20"
trait-variant = "0.1.2"
url = "2.5.4"

[profile.release]
lto = true
