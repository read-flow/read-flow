[package]
name = "archive-organizer"
version = "0.1.0"
edition = "2021"
license = "MIT"

[features]
gui = ["dep:iced", "dep:iced_aw", "dep:rfd"]
server = ["dep:rocket"]

[dependencies]
anyhow = "1.0.89"
async-trait = "0.1.83"
clap = { version = "4.5.20", features = ["derive"] }
diesel = { version = "2.2.0", features = ["sqlite", "r2d2", "returning_clauses_for_sqlite_3_35"] }
diesel_migrations = { version = "2.2.0", features = ["sqlite"] }
# build libsqlite3 as part of the build process
# uncomment this line if you run into setup issues
# libsqlite3-sys = { version = "0.30", features = ["bundled"] }
dotenvy = "0.15"
futures = "0.3.31"
iced = { version = "0.13.1", optional = true, features = ["tokio"] }
iced_aw = { version = "0.11.0", optional = true, default-features = false, features = ["grid"] }
indexmap = "2.6.0"
itertools = "0.13.0"
mime = "0.3.17"
r2d2 = "0.8.10"
rayon = "1.10.0"
reqwest = { version = "0.12.8", features = ["json", "stream", "multipart"] }
rfd = { version = "0.15.0", optional = true }
rocket = { version = "0.5.1", optional = true, features = ["http2", "json"] }
serde = { version = "1.0.210", features = ["derive"] }
thiserror = "1.0.64"
tokio = { version = "1.40.0", features = ["rt-multi-thread"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["std", "env-filter"] }
url = "2.5.2"
