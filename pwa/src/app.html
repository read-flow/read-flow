<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<!-- viewport-fit=cover enables env(safe-area-inset-*) for iOS notch/home bar -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#1e293b" />
		<meta name="description" content="Personal document library and reader" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<!--
			Apply the saved theme before the first paint to prevent a flash of the wrong
			colour scheme. localStorage is synchronous and runs before any CSS is applied.
		-->
		<script>
			try {
				var DARK = ['slate-dark','nord-dark','catppuccin-frappe','catppuccin-macchiato','catppuccin-mocha','one-dark'];
				var CUSTOM = ['nord-light','nord-dark','catppuccin-latte','catppuccin-frappe','catppuccin-macchiato','catppuccin-mocha','one-light','one-dark'];

				// Migrate from intermediate 'read-flow-scheme' key
				var _prev = localStorage.getItem('read-flow-scheme');
				if (_prev && !localStorage.getItem('read-flow-mode')) {
					if (DARK.indexOf(_prev) !== -1) {
						localStorage.setItem('read-flow-mode', 'dark');
						localStorage.setItem('read-flow-dark-scheme', _prev);
					} else if (_prev !== 'system') {
						localStorage.setItem('read-flow-mode', 'light');
						localStorage.setItem('read-flow-light-scheme', _prev);
					}
					localStorage.removeItem('read-flow-scheme');
				}
				// Migrate from oldest 'read-flow-theme' key
				var _oldest = localStorage.getItem('read-flow-theme');
				if (_oldest && !localStorage.getItem('read-flow-mode')) {
					if (_oldest === 'dark') localStorage.setItem('read-flow-mode', 'dark');
					if (_oldest === 'light') localStorage.setItem('read-flow-mode', 'light');
					localStorage.removeItem('read-flow-theme');
				}

				var mode  = localStorage.getItem('read-flow-mode') || 'system';
				var light = localStorage.getItem('read-flow-light-scheme') || 'slate-light';
				var dark  = localStorage.getItem('read-flow-dark-scheme')  || 'slate-dark';
				var osDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var scheme = mode === 'light' ? light : mode === 'dark' ? dark : (osDark ? dark : light);
				document.documentElement.classList.toggle('dark', DARK.indexOf(scheme) !== -1);
				if (CUSTOM.indexOf(scheme) !== -1) document.documentElement.setAttribute('data-scheme', scheme);
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
