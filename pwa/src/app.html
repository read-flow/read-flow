<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<!-- viewport-fit=cover enables env(safe-area-inset-*) for iOS notch/home bar -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#1e293b" />
		<meta name="description" content="Personal document library and reader" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<!--
			Apply the saved theme before the first paint to prevent a flash of the wrong
			colour scheme. localStorage is synchronous and runs before any CSS is applied.
		-->
		<script>
			try {
				// Migrate old key if present
				var _old = localStorage.getItem('read-flow-theme');
				if (_old && !localStorage.getItem('read-flow-scheme')) {
					if (_old === 'light') localStorage.setItem('read-flow-scheme', 'slate-light');
					else if (_old === 'dark') localStorage.setItem('read-flow-scheme', 'slate-dark');
					localStorage.removeItem('read-flow-theme');
				}
				var DARK = ['slate-dark','nord-dark','catppuccin-frappe','catppuccin-macchiato','catppuccin-mocha','one-dark'];
				var CUSTOM = ['nord-light','nord-dark','catppuccin-latte','catppuccin-frappe','catppuccin-macchiato','catppuccin-mocha','one-light','one-dark'];
				var s = localStorage.getItem('read-flow-scheme') || 'system';
				var dark = DARK.indexOf(s) !== -1 || (s === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				document.documentElement.classList.toggle('dark', dark);
				if (CUSTOM.indexOf(s) !== -1) document.documentElement.setAttribute('data-scheme', s);
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
