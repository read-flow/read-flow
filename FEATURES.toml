# Canonical feature catalog — single source of truth for PWA ⇄ COSMIC parity.
#
# Each [[feature]] declares:
#   id          stable dotted identifier (also used in @feature: code tags)
#   description one-line human summary
#   surfaces    the surfaces this feature is *expected* to exist on, for parity
#               (subset of: "cosmic", "pwa", "rest")
#   gaps        (optional) surfaces that are intentionally NOT yet implemented
#               — an acknowledged backlog item. Rendered as a gap in the matrix
#               but does not fail the checker. Remove an entry from `gaps` and add
#               the matching `@feature:` annotation when you implement it.
#
# Verification: implementations carry a code annotation `@feature: <id>`
#   - Rust:        /// @feature: documents.select_cover   (doc-comment)
#   - TS/Svelte:   // @feature: documents.select_cover
# The checker `core/tests/feature_matrix.rs` reconciles annotations with this
# catalog, regenerates FEATURE_MATRIX.md, and fails on orphan/drifted tags or
# unacknowledged missing surfaces. See that file for the exact policy.
#
# Surface → scanned tree:
#   cosmic → cosmic/src (+ widgets/src)   pwa → pwa/src   rest → core/src

