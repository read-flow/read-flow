<!doctype html>
<html>
    <head>
        <title>Read Flow</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body class="min-h-screen bg-gray-100 font-sans">
        <!-- Desktop Application Header -->
        <header
            class="bg-gray-900 text-white shadow-lg border-b border-gray-700"
        >
            <div class="px-6 py-3 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold"
                    >
                        A
                    </div>
                    <h1 class="text-xl font-semibold">Read Flow</h1>
                </div>
                <div class="flex items-center space-x-4 text-sm text-gray-300">
                    <span id="file-count">0 files</span>
                    <span>•</span>
                    <span id="filtered-count">0 showing</span>
                </div>
            </div>
        </header>

        <!-- Desktop Application Main Content -->
        <main class="flex flex-col h-screen bg-white">
            <!-- Control Panel -->
            <div
                id="control-panel"
                class="bg-gray-50 border-b border-gray-200 p-4"
            >
                <!-- Controls will be inserted here -->
            </div>

            <!-- Content Area with Table and Details Pane -->
            <div class="flex flex-1 overflow-hidden min-w-0">
                <!-- Table Container -->
                <div
                    id="table-container"
                    class="flex-1 overflow-auto transition-all duration-300 min-w-0"
                >
                    <div class="min-w-full">
                        <!-- Table Header -->
                        <div
                            class="bg-gray-100 border-b border-gray-300 sticky top-0 z-10"
                        >
                            <div
                                class="flex text-xs font-semibold text-gray-700 uppercase tracking-wider"
                            >
                                <div
                                    class="flex-1 px-4 py-3 text-left border-r border-gray-300"
                                >
                                    Name
                                </div>
                                <div
                                    class="w-32 px-4 py-3 text-left border-r border-gray-300"
                                >
                                    Type
                                </div>
                                <div
                                    class="w-24 px-4 py-3 text-right border-r border-gray-300"
                                >
                                    Size
                                </div>
                                <div
                                    class="w-40 px-4 py-3 text-left border-r border-gray-300"
                                >
                                    Directory
                                </div>
                                <div class="w-60 px-4 py-3 text-left">Tags</div>
                            </div>
                        </div>

                        <!-- Table Body -->
                        <div id="file-table-body" class="bg-white">
                            <!-- File rows will be inserted here -->
                        </div>
                    </div>
                </div>

                <!-- Resize Handle -->
                <div
                    id="resize-handle"
                    class="hidden flex-shrink-0 w-1 bg-gray-300 hover:bg-blue-500 cursor-col-resize transition-colors duration-200 relative group"
                    title="Drag to resize details pane"
                >
                    <div class="absolute inset-y-0 -left-1 -right-1"></div>
                </div>

                <!-- File Details Pane -->
                <div
                    id="details-pane"
                    class="hidden flex-shrink-0 bg-white border-l border-gray-300 flex flex-col transition-all duration-300"
                    style="width: 384px; min-width: 300px; max-width: 50vw"
                >
                    <!-- Details Header -->
                    <div
                        class="details-header bg-gray-50 border-b border-gray-200 p-4 flex items-center justify-between"
                    >
                        <h2 class="text-lg font-semibold text-gray-900">
                            File Details
                        </h2>
                        <button
                            id="close-details-pane"
                            class="text-gray-400 hover:text-gray-600 text-xl font-bold"
                        >
                            ×
                        </button>
                    </div>

                    <!-- Details Content -->
                    <div id="details-content" class="flex-1 overflow-auto p-4">
                        <!-- File details will be inserted here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- PDF Viewer Modal -->
        <div
            id="pdf-viewer-container"
            class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center"
        >
            <div
                class="bg-white rounded-lg shadow-2xl w-full h-full max-w-6xl max-h-screen m-4 flex flex-col"
            >
                <div
                    class="flex justify-between items-center p-4 border-b border-gray-200"
                >
                    <h3 class="text-lg font-semibold text-gray-900">
                        PDF Viewer
                    </h3>
                    <button
                        id="close-pdf-viewer"
                        class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition-colors"
                    >
                        Close
                    </button>
                </div>
                <div id="pdf-viewer" class="flex-1 overflow-auto p-4">
                    <!-- PDF.js viewer will be injected here -->
                </div>
            </div>
        </div>

        <!-- Login Modal -->
        <div
            id="login-modal"
            class="fixed inset-0 bg-gray-900 bg-opacity-90 z-50 flex items-center justify-center"
        >
            <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-sm">
                <div class="flex items-center space-x-3 mb-6">
                    <div
                        class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold"
                    >
                        A
                    </div>
                    <h2 class="text-xl font-semibold text-gray-900">
                        Read Flow
                    </h2>
                </div>
                <div
                    id="login-error"
                    class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded"
                ></div>
                <form id="login-form">
                    <div class="mb-4">
                        <label
                            for="login-username"
                            class="block text-sm font-medium text-gray-700 mb-1"
                            >Username</label
                        >
                        <input
                            type="text"
                            id="login-username"
                            name="username"
                            required
                            autocomplete="username"
                            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                    </div>
                    <div class="mb-6">
                        <label
                            for="login-password"
                            class="block text-sm font-medium text-gray-700 mb-1"
                            >Password</label
                        >
                        <input
                            type="password"
                            id="login-password"
                            name="password"
                            required
                            autocomplete="current-password"
                            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                    </div>
                    <button
                        type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded text-sm transition-colors"
                    >
                        Sign in
                    </button>
                </form>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
