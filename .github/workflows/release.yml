# Release workflow — builds prebuilt binaries and opens a draft GitHub Release.
#
# Triggered by pushing a tag like `v0.1.0`. Produces:
#   - Linux x86_64:  portable .tar.gz  +  .deb
#   - Linux arm64:   portable .tar.gz  +  .deb (e.g. Raspberry Pi 5)
#   - macOS arm64:   .app bundle, zipped (UNSIGNED — see README install notes)
#   - Flatpak:       single-file .flatpak bundle (flatpak/*.yml manifest — draft,
#                     see RELEASING.md "Application stores"; this is CI-built for
#                     direct install, not yet submitted to Flathub itself)
#   - SHA256SUMS for every artifact
#
# TODO (see RELEASING.md open questions):
#   - macOS code signing + notarization
#   - additional targets: macOS Intel
#   - submit the Flatpak manifest to Flathub; set up a Homebrew tap
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  changelog:
    name: Extract changelog
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        name: Extract notes for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Grab the body of "## [<version>]" up to the next section, link-reference
          # block, or trailing comment.
          notes="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && (/^## \[/ || /^\[.*\]: / || /^<!--/) { exit }
            grab { print }
          ' CHANGELOG.md)"
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libudev-dev libinput-dev \
            libgbm-dev libegl1-mesa-dev libsqlite3-dev libfontconfig1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - name: Install PWA dependencies
        run: npm ci
        working-directory: pwa
      - name: Install packaging tools
        run: |
          cargo install just
          cargo install cargo-deb
      - name: Build release + .deb
        run: just deb          # runs build-release, then cargo-deb
      - name: Assemble portable tarball
        run: |
          pkg="read-flow-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}"
          mkdir -p "dist/${pkg}"
          cp target/release/read-flow "dist/${pkg}/"
          cp cosmic/resources/io.github.read-flow.desktop "dist/${pkg}/"
          cp cosmic/resources/io.github.read-flow.metainfo.xml "dist/${pkg}/"
          cp cosmic/resources/icons/hicolor/scalable/apps/icon.svg "dist/${pkg}/read-flow.svg"
          cp README.md LICENSE-AGPL NOTICE "dist/${pkg}/"
          tar -czf "${pkg}.tar.gz" -C dist "${pkg}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            target/debian/*.deb
            read-flow-*-linux-${{ matrix.arch }}.tar.gz

  build-macos:
    name: Build macOS arm64
    runs-on: macos-14          # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - name: Install PWA dependencies
        run: npm ci
        working-directory: pwa
      - name: Install tooling
        run: |
          brew install librsvg
          cargo install just
      - name: Build .app bundle
        run: just bundle
      - name: Zip the bundle (unsigned)
        run: |
          cd target/release
          zip -r -y "../../read-flow-${GITHUB_REF_NAME}-macos-arm64.zip" "Read Flow.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: read-flow-*-macos-arm64.zip

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Generate offline cargo/npm sources
        run: |
          python3 -m ensurepip --upgrade || (apt-get update && apt-get install -y python3-pip)
          python3 -m pip install --break-system-packages aiohttp tomlkit pyyaml
          python3 -m pip install --break-system-packages \
            "git+https://github.com/flatpak/flatpak-builder-tools#subdirectory=node"
          curl -sL -o flatpak/cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 flatpak/cargo-generator.py Cargo.lock -o flatpak/cargo-sources.json
          flatpak-node-generator npm pwa/package-lock.json -o flatpak/node-sources.json
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: read-flow-${{ github.ref_name }}.flatpak
          manifest-path: flatpak/io.github.read-flow.yml
          cache-key: flatpak-builder-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: read-flow-*.flatpak

  release:
    name: Publish draft release
    needs: [changelog, build-linux, build-macos, build-flatpak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect artifacts and checksums
        run: |
          mkdir -p out
          find artifacts -type f \( -name '*.deb' -o -name '*.tar.gz' -o -name '*.zip' -o -name '*.flatpak' \) \
            -exec cp {} out/ \;
          cd out
          shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Read Flow ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.notes }}
          files: out/*
