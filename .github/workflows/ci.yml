name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all --check

  rust:
    name: clippy & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - name: Install libcosmic system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libudev-dev libinput-dev \
            libgbm-dev libegl1-mesa-dev libsqlite3-dev libfontconfig1-dev pkg-config
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Tests
        run: cargo nextest run --workspace
      - name: Collect golden test failures
        if: failure()
        run: |
          find . -path ./target -prune -o -name '*.actual.png' -print | while read -r f; do
            echo "::warning file=${f#./}::golden test failure"
            base="${f%.actual.png}"
            [ -f "$base.png" ] && cp "$base.png" "$base.expected.png"
          done
      - name: Upload golden test failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: |
            **/snapshots/**/*.actual.png
            **/snapshots/**/*.diff.png
            **/snapshots/**/*.expected.png
          if-no-files-found: ignore
          retention-days: 14

  pwa:
    name: web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm test
